<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BuyPin - Oyinlar Toʻldirish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes slideInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(91, 77, 255, 0.4); } 50% { box-shadow: 0 0 30px rgba(91, 77, 255, 0.8); } }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
  @keyframes spinner { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(91, 77, 255, 0.3); border-top-color: #7a6bff; border-radius: 50%; animation: spinner 0.8s linear infinite; }

  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #0a0f1f 0%, #1a1f3a 100%);
    color: #ffffff;
    padding: 12px;
    padding-bottom: 90px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    animation: slideInDown 0.6s ease-out;
  }
  .header .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5b4dff, #7a6bff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
  }
  .header .info { flex: 1; }
  .header .name { font-weight: 700; font-size: 15px; }
  .header .username { font-size: 11px; color: #8a8f9a; }
  .header .coins {
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 700;
    font-size: 14px;
    background: rgba(255, 193, 7, 0.15);
    padding: 6px 10px;
    border-radius: 20px;
    color: #ffc107;
  }

  /* ===== BALANCE CARD ===== */
  .balance-card {
    background: linear-gradient(135deg, #5b4dff 0%, #7a6bff 100%);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
    animation: slideInDown 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), glow 3s ease-in-out infinite;
  }
  .balance-label { font-size: 12px; opacity: 0.9; margin-bottom: 6px; }
  .balance-amount { font-size: 32px; font-weight: 700; margin-bottom: 14px; }
  .balance-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .balance-btn {
    background: rgba(255,255,255,0.18);
    border: none;
    color: #fff;
    padding: 10px 6px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .balance-btn:hover { background: rgba(255,255,255,0.28); transform: translateY(-2px); }
  .balance-btn:active { transform: scale(0.95); }

  /* ===== TABS ===== */
  .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .tabs button {
    padding: 12px;
    border-radius: 14px;
    border: none;
    background: #1a1f3a;
    color: #8a8f9a;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .tabs button.active {
    background: linear-gradient(135deg, #5b4dff, #7a6bff);
    color: #fff;
    box-shadow: 0 0 20px rgba(91, 77, 255, 0.5);
  }
  .tabs button:hover:not(.active) { background: #252a4a; }

  /* ===== GAMES GRID ===== */
  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .game-card {
    background: linear-gradient(135deg, #1a1f3a 0%, #252a4a 100%);
    border: 1px solid rgba(91, 77, 255, 0.2);
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: fadeInUp 0.5s ease-out backwards;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .game-card:nth-child(1) { animation-delay: 0.1s; }
  .game-card:nth-child(2) { animation-delay: 0.15s; }
  .game-card:nth-child(3) { animation-delay: 0.2s; }
  .game-card:nth-child(4) { animation-delay: 0.25s; }
  .game-card:nth-child(5) { animation-delay: 0.3s; }
  .game-card:nth-child(6) { animation-delay: 0.35s; }
  .game-card:nth-child(7) { animation-delay: 0.4s; }
  .game-card:nth-child(8) { animation-delay: 0.45s; }

  .game-card:hover {
    transform: translateY(-8px) scale(1.06);
    border-color: rgba(91, 77, 255, 0.5);
    box-shadow: 0 15px 40px rgba(91, 77, 255, 0.3);
    background: linear-gradient(135deg, #252a4a 0%, #2a2f5a 100%);
  }
  .game-card:active { transform: scale(0.95); }

  .game-icon {
    width: 100%;
    height: 60px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(91, 77, 255, 0.3) 0%, rgba(122, 107, 255, 0.2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  .game-name { font-weight: 700; font-size: 11px; color: #fff; }
  .game-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: linear-gradient(135deg, #ff9800, #f57c00);
    color: #fff;
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 8px;
    font-weight: 700;
  }

  /* ===== VARIANT MODAL ===== */
  .variant-modal { display: none; animation: fadeInUp 0.4s ease-out; }
  .variant-modal.active { display: block; }
  .variant-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    animation: slideInDown 0.5s ease-out;
  }
  .variant-back {
    background: #1a1f3a;
    border: none;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.3s ease;
  }
  .variant-back:hover { background: #252a4a; transform: scale(1.05); }
  .variant-title { flex: 1; font-weight: 700; font-size: 16px; }

  .input-group {
    margin-bottom: 12px;
    animation: fadeInUp 0.5s ease-out 0.1s backwards;
  }
  .input-label { font-size: 11px; color: #8a8f9a; margin-bottom: 6px; display: block; }
  .input-field {
    width: 100%;
    background: #1a1f3a;
    border: 2px solid rgba(91, 77, 255, 0.2);
    color: #fff;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    transition: all 0.3s ease;
  }
  .input-field:focus { outline: none; border-color: #5b4dff; background: #252a4a; box-shadow: 0 0 12px rgba(91, 77, 255, 0.3); }
  .input-field::placeholder { color: #5a5f7a; }

  .variants-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .variant-item {
    background: linear-gradient(135deg, #1a1f3a 0%, #252a4a 100%);
    border: 2px solid rgba(91, 77, 255, 0.2);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: fadeInUp 0.4s ease-out backwards;
  }
  .variant-item:hover {
    border-color: #5b4dff;
    background: linear-gradient(135deg, #252a4a 0%, #2a2f5a 100%);
    box-shadow: 0 10px 25px rgba(91, 77, 255, 0.3);
    transform: translateY(-3px);
  }
  .variant-item.selected {
    border-color: #5b4dff;
    background: linear-gradient(135deg, #5b4dff 0%, #7a6bff 100%);
  }
  .variant-label { font-weight: 600; font-size: 12px; color: #fff; margin-bottom: 4px; }
  .variant-price { font-size: 11px; color: #7a6bff; font-weight: 700; }

  .buy-btn {
    width: 100%;
    background: linear-gradient(135deg, #5b4dff 0%, #7a6bff 100%);
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 25px rgba(91, 77, 255, 0.4);
  }
  .buy-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(91, 77, 255, 0.6); }
  .buy-btn:active { transform: scale(0.96); }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(10, 15, 31, 0.98), rgba(10, 15, 31, 0.9));
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(91, 77, 255, 0.2);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 16px;
  }
  .nav-item {
    flex: 1;
    text-align: center;
    color: #8a8f9a;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 6px 0;
  }
  .nav-item.active { color: #5b4dff; font-weight: 700; }

  .loading { text-align: center; padding: 30px 20px; color: #8a8f9a; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar" id="avatar">👤</div>
  <div class="info">
    <div class="name" id="userName">Foydalanuvchi</div>
    <div class="username" id="userUsername"></div>
  </div>
  <div class="coins">
    💰 <span id="balance">0</span>
  </div>
</div>

<!-- BALANCE CARD -->
<div class="balance-card">
  <div class="balance-label">Balans</div>
  <div class="balance-amount"><span id="balanceAmount">0</span> so'm</div>
  <div class="balance-actions">
    <button class="balance-btn" onclick="alert('💳 Hisobni to\'ldirish keyin qo\'shiladi')">💳 Hisobni toldirish</button>
    <button class="balance-btn" onclick="alert('🎁 Bonus kodlar keyin qo\'shiladi')">🎁 Bonus kodlar</button>
    <button class="balance-btn" onclick="alert('💬 Support: @S_T_bot')">💬 Qo\'llab-quvvatlash</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="active" onclick="switchTab('games')">🎮 O'yinlar</button>
  <button onclick="switchTab('promo')">🏷️ Promokodlar</button>
</div>

<!-- GAMES VIEW -->
<div id="gamesView" class="games-grid"></div>

<!-- PROMO VIEW -->
<div id="promoView" style="display:none; padding:20px; text-align:center; color:#8a8f9a;">
  <p>Promokodlar keyin qo'shiladi</p>
</div>

<!-- HISTORY VIEW -->
<div id="historyView" style="display:none;">
  <div id="historyList" style="display:flex; flex-direction:column; gap:10px;"></div>
</div>

<!-- VARIANT MODAL -->
<div id="variantModal" class="variant-modal">
  <div class="variant-header">
    <button class="variant-back" onclick="backToGames()">←</button>
    <div class="variant-title" id="variantTitle"></div>
  </div>
  <div id="inputFields"></div>
  <div id="variantsGrid" class="variants-grid"></div>
  <button class="buy-btn" onclick="completePurchase()">SOTIB OLISH</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('games')">🏠 Bosh sahifa</div>
  <div class="nav-item" onclick="switchTab('history')">📜 Tarix</div>
  <div class="nav-item" onclick="alert('Sozlamalar keyin qo\'shiladi')">⚙️ Sozlamalar</div>
  <div class="nav-item" onclick="alert('Ijaraga keyin qo\'shiladi')">🎁 Ijaraga</div>
</div>

<script>
  const API_BASE = "https://oxford-moving-curling.ngrok-free.dev";
  const tg = window.Telegram?.WebApp;
  let currentUser = null;
  let selectedProduct = null;
  let selectedVariant = null;

  if (tg) {
    tg.expand();
    tg.ready();
  }

  const apiHeaders = {
    "Content-Type": "application/json",
    "ngrok-skip-browser-warning": "true",
  };

  async function loadUser() {
    const tgUser = tg?.initDataUnsafe?.user;
    const telegram_id = tgUser?.id || 123456;
    const first_name = tgUser?.first_name || "Mehmon";
    const username = tgUser?.username || "";

    document.getElementById('userName').textContent = first_name;
    document.getElementById('userUsername').textContent = username ? '@' + username : '';
    document.getElementById('avatar').textContent = first_name.charAt(0).toUpperCase() || '👤';

    try {
      const res = await fetch(`${API_BASE}/user`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({ telegram_id, first_name, username }),
      });
      currentUser = await res.json();
      updateBalance();
    } catch (err) {
      console.error("Backend xatosi:", err);
      document.getElementById('balance').textContent = "xato";
      document.getElementById('balanceAmount').textContent = "xato";
    }
  }

  function updateBalance() {
    if (currentUser) {
      document.getElementById('balance').textContent = currentUser.balance.toLocaleString();
      document.getElementById('balanceAmount').textContent = currentUser.balance.toLocaleString();
    }
  }

  async function loadProducts() {
    const container = document.getElementById('gamesView');
    container.innerHTML = '<div class="loading" style="grid-column:1/-1;"><div class="spinner"></div>Yuklanmoqda...</div>';
    
    try {
      const res = await fetch(`${API_BASE}/products`, { headers: apiHeaders });
      const products = await res.json();

      container.innerHTML = "";
      products.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="game-badge">⭐ Global</div>
          <div class="game-icon">${p.icon}</div>
          <div class="game-name">${p.name}</div>
        `;
        card.onclick = () => showVariants(p);
        container.appendChild(card);
      });
    } catch (err) {
      container.innerHTML = '<div class="loading" style="grid-column:1/-1;"><p style="color:#ff6b6b;">Backendga ulanib bo\'lmadi</p></div>';
    }
  }

  async function loadHistory() {
    const historyList = document.getElementById('historyList');
    historyList.innerHTML = '<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';
    
    try {
      const res = await fetch(`${API_BASE}/admin/orders?key=buypin_admin_2026`, { headers: apiHeaders });
      const orders = await res.json();
      
      // Faqat bu foydalanuvchining buyurtmalarini ko'rsat - eng yangi avval
      const userOrders = orders.filter(o => o.telegram_id === currentUser.telegram_id);
      
      if (userOrders.length === 0) {
        historyList.innerHTML = '<p style="text-align:center; color:#8a8f9a; padding:20px;">Tarix bo\'sh</p>';
        return;
      }
      
      historyList.innerHTML = '';
      // Eng oxirgi (yangi) order avval ko'rsat
      userOrders.reverse().forEach((order, idx) => {
        const date = new Date(order.created_at).toLocaleString('uz-UZ');
        const div = document.createElement('div');
        div.style.cssText = 'background:linear-gradient(135deg, #1a1f3a 0%, #252a4a 100%); border-left:4px solid #5b4dff; border-radius:12px; padding:14px; animation:fadeInUp 0.5s ease-out backwards;';\n        div.style.animationDelay = (idx * 0.05) + 's';\n        div.innerHTML = `\n          <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;\">\n            <div style=\"font-weight:600; font-size:13px; color:#fff;\">${order.product_name}</div>\n            <div style=\"color:#2ecc71; font-weight:600; font-size:12px;\">-${order.price.toLocaleString()} so'm</div>\n          </div>\n          <div style=\"font-size:11px; color:#8a8f9a; margin-bottom:6px;\">${date}</div>\n          <div style=\"background:#2a2f6b; color:#7a6bff; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:600; width:fit-content;\">✓ ${order.status}</div>\n        `;\n        historyList.prepend(div);\n      });\n    } catch (err) {\n      historyList.innerHTML = '<p style="color:#ff6b6b;">Tarixni olishda xato</p>';\n    }\n  }

  function showVariants(product) {
    selectedProduct = product;
    selectedVariant = null;
    
    document.getElementById('gamesView').style.display = 'none';
    document.getElementById('variantModal').classList.add('active');
    document.getElementById('variantTitle').textContent = `${product.icon} ${product.name}`;

    let inputHTML = '';
    if (product.name.includes('TG STARS') || product.name.includes('TG PREMIUM')) {
      inputHTML = `<div class="input-group"><label class="input-label">@️ Telegram Username</label><input type="text" id="playerInput" class="input-field" placeholder="@username"></div>`;
    } else if (product.name.includes('MOBILE LEGENDS')) {
      inputHTML = `
        <div class="input-group"><label class="input-label">🆔 O'yinchi ID</label><input type="text" id="playerInput" class="input-field" placeholder="O'yinchi ID"></div>
        <div class="input-group"><label class="input-label">🖥️ Server</label><select id="serverInput" class="input-field"><option>VIP (Global)</option><option>PH</option><option>ID</option><option>MY</option><option>TH</option><option>SG</option></select></div>
      `;
    } else {
      inputHTML = `<div class="input-group"><label class="input-label">👤 O'yinchi ID</label><input type="text" id="playerInput" class="input-field" placeholder="O'yinchi ID kiriting"></div>`;
    }

    document.getElementById('inputFields').innerHTML = inputHTML;

    const grid = document.getElementById('variantsGrid');
    grid.innerHTML = '';
    product.variants.forEach((v, idx) => {
      const item = document.createElement('div');
      item.className = 'variant-item';
      item.style.animationDelay = (idx * 0.05) + 's';
      item.innerHTML = `<div class="variant-label">${v.label}</div><div class="variant-price">${v.price.toLocaleString()} so'm</div>`;
      item.onclick = () => selectVariant(item, v);
      grid.appendChild(item);
    });
  }

  function selectVariant(element, variant) {
    document.querySelectorAll('.variant-item').forEach(e => e.classList.remove('selected'));
    element.classList.add('selected');
    selectedVariant = variant;
  }

  function backToGames() {
    document.getElementById('variantModal').classList.remove('active');
    document.getElementById('gamesView').style.display = 'grid';
  }

  async function completePurchase() {
    if (!selectedVariant) {
      alert('Paketni tanlang');
      return;
    }
    
    const playerInput = document.getElementById('playerInput')?.value.trim();
    if (!playerInput) {
      alert('Ma\'lumot kiriting');
      return;
    }

    if (!currentUser) return;

    const confirmed = confirm(`${selectedProduct.name} - ${selectedVariant.label}\n${selectedVariant.price.toLocaleString()} so'm\n\nTasdiq?`);
    if (!confirmed) return;

    try {
      const res = await fetch(`${API_BASE}/order`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({
          telegram_id: currentUser.telegram_id,
          product_name: `${selectedProduct.name} - ${selectedVariant.label}`,
          price: selectedVariant.price,
        }),
      });
      const result = await res.json();

      if (result.success) {
        alert("✅ " + result.message);
        loadUser();
        backToGames();
        loadProducts();
      } else {
        alert("❌ " + result.message);
      }
    } catch (err) {
      alert("Xato yuz berdi");
    }
  }

  function switchTab(tab) {
    document.getElementById('gamesView').style.display = tab === 'games' ? 'grid' : 'none';
    document.getElementById('promoView').style.display = tab === 'promo' ? 'block' : 'none';
    document.getElementById('historyView').style.display = tab === 'history' ? 'block' : 'none';
    
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    if (tab === 'games') document.querySelectorAll('.tabs button')[0].classList.add('active');
    if (tab === 'promo') document.querySelectorAll('.tabs button')[1].classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (tab === 'games') document.querySelectorAll('.nav-item')[0].classList.add('active');
    if (tab === 'history') document.querySelectorAll('.nav-item')[1].classList.add('active');

    if (tab === 'games') loadProducts();
    if (tab === 'history') loadHistory();
  }

  window.addEventListener('load', () => {
    loadUser();
    loadProducts();
  });
</script>

</body>
</html>
