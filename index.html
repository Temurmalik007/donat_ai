<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BuyPin - Oyinlar Toʻldirish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes slideInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(91, 77, 255, 0.4); } 50% { box-shadow: 0 0 40px rgba(91, 77, 255, 0.9); } }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.08); } }
  @keyframes spinner { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

  .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(91, 77, 255, 0.3); border-top-color: #7a6bff; border-radius: 50%; animation: spinner 0.8s linear infinite; }

  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #0a0f1f 0%, #1a1f3a 100%);
    color: #ffffff;
    padding: 12px;
    padding-bottom: 20px;
    min-height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: slideInDown 0.6s ease-out;
  }
  .header .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5b4dff, #7a6bff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    box-shadow: 0 0 20px rgba(91, 77, 255, 0.5);
  }
  .header .info { flex: 1; }
  .header .name { font-weight: 700; font-size: 16px; }
  .header .username { font-size: 12px; color: #8a8f9a; }

  .balance-card {
    background: linear-gradient(135deg, #5b4dff 0%, #7a6bff 100%);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    animation: slideInDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), glow 3s ease-in-out infinite;
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }
  .balance-label { font-size: 13px; opacity: 0.9; margin-bottom: 6px; animation: fadeInUp 0.7s ease-out 0.1s backwards; }
  .balance-amount { font-size: 36px; font-weight: 700; margin-bottom: 16px; animation: fadeInUp 0.7s ease-out 0.2s backwards; }
  .balance-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; animation: fadeInUp 0.7s ease-out 0.3s backwards; }
  .balance-btn {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 12px 8px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .balance-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
  .balance-btn:active { transform: scale(0.95); }

  .products-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .product-card {
    background: linear-gradient(135deg, #1a1f3a 0%, #252a4a 100%);
    border: 1px solid rgba(91, 77, 255, 0.2);
    border-radius: 18px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: fadeInUp 0.5s ease-out backwards;
    text-align: center;
  }
  .product-card:hover {
    transform: translateY(-8px) scale(1.04);
    border-color: rgba(91, 77, 255, 0.5);
    box-shadow: 0 20px 50px rgba(91, 77, 255, 0.3);
    background: linear-gradient(135deg, #252a4a 0%, #2a2f5a 100%);
  }
  .product-card:active { animation: scaleIn 0.2s ease; }
  .product-icon {
    font-size: 52px;
    margin-bottom: 12px;
    animation: pulse 2.5s ease-in-out infinite;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(91, 77, 255, 0.2) 0%, rgba(122, 107, 255, 0.1) 100%);
    width: 70px;
    height: 70px;
    border-radius: 16px;
  }
  .product-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 4px; }
  .product-desc { font-size: 11px; color: #8a8f9a; }

  .variant-modal {
    display: none;
    animation: fadeInUp 0.4s ease-out;
  }
  .variant-modal.active { display: block; }
  .variant-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: slideInDown 0.5s ease-out;
  }
  .variant-back {
    background: #1a1f3a;
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.3s ease;
  }
  .variant-back:hover { background: #252a4a; transform: scale(1.05); }
  .variant-title { flex: 1; font-weight: 700; font-size: 18px; }

  .input-group {
    margin-bottom: 16px;
    animation: fadeInUp 0.5s ease-out 0.1s backwards;
  }
  .input-label { font-size: 12px; color: #8a8f9a; margin-bottom: 8px; display: block; }
  .input-field {
    width: 100%;
    background: #1a1f3a;
    border: 2px solid rgba(91, 77, 255, 0.2);
    color: #fff;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    transition: all 0.3s ease;
  }
  .input-field:focus { outline: none; border-color: #5b4dff; background: #252a4a; box-shadow: 0 0 15px rgba(91, 77, 255, 0.3); }
  .input-field::placeholder { color: #5a5f7a; }

  .variants-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .variant-item {
    background: linear-gradient(135deg, #1a1f3a 0%, #252a4a 100%);
    border: 2px solid rgba(91, 77, 255, 0.2);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: scaleIn 0.4s ease-out backwards;
  }
  .variant-item:hover {
    border-color: #5b4dff;
    background: linear-gradient(135deg, #252a4a 0%, #2a2f5a 100%);
    box-shadow: 0 10px 30px rgba(91, 77, 255, 0.3);
    transform: translateY(-4px);
  }
  .variant-item.selected {
    border-color: #5b4dff;
    background: linear-gradient(135deg, #5b4dff 0%, #7a6bff 100%);
  }
  .variant-label { font-weight: 600; font-size: 13px; color: #fff; margin-bottom: 6px; }
  .variant-price { font-size: 12px; color: #7a6bff; font-weight: 700; }

  .buy-btn {
    width: 100%;
    background: linear-gradient(135deg, #5b4dff 0%, #7a6bff 100%);
    border: none;
    color: #fff;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 10px 30px rgba(91, 77, 255, 0.4);
    animation: fadeInUp 0.6s ease-out 0.5s backwards;
  }
  .buy-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(91, 77, 255, 0.6);
  }
  .buy-btn:active { transform: scale(0.95); }
  .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading { text-align: center; padding: 40px 20px; color: #8a8f9a; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar" id="avatar">👤</div>
  <div class="info">
    <div class="name" id="userName">Foydalanuvchi</div>
    <div class="username" id="userUsername"></div>
  </div>
</div>

<div class="balance-card">
  <div class="balance-label">💰 Balans</div>
  <div class="balance-amount"><span id="balance">0</span> so'm</div>
  <div class="balance-actions">
    <button class="balance-btn" onclick="alert('💳 Hisobni to\'ldirish keyin qo\'shiladi')">💳 To'ldirish</button>
    <button class="balance-btn" onclick="alert('🎁 Bonus kodlar keyin qo\'shiladi')">🎁 Bonus</button>
    <button class="balance-btn" onclick="alert('📞 Support: @S_T_bot')">📞 Support</button>
  </div>
</div>

<div id="productsView" class="products-grid"></div>

<div id="variantView" class="variant-modal">
  <div class="variant-header">
    <button class="variant-back" onclick="backToProducts()">←</button>
    <div class="variant-title" id="variantTitle"></div>
  </div>
  <div id="inputFields"></div>
  <div id="variantsGrid" class="variants-grid"></div>
  <button class="buy-btn" onclick="completePurchase()">SOTIB OLISH</button>
</div>

<script>
  const API_BASE = "https://oxford-moving-curling.ngrok-free.dev";
  const tg = window.Telegram?.WebApp;
  let currentUser = null;
  let selectedProduct = null;
  let selectedVariant = null;

  if (tg) {
    tg.expand();
    tg.ready();
  }

  const apiHeaders = {
    "Content-Type": "application/json",
    "ngrok-skip-browser-warning": "true",
  };

  async function loadUser() {
    const tgUser = tg?.initDataUnsafe?.user;
    const telegram_id = tgUser?.id || 123456;
    const first_name = tgUser?.first_name || "Mehmon";
    const username = tgUser?.username || "";

    document.getElementById('userName').textContent = first_name;
    document.getElementById('userUsername').textContent = username ? '@' + username : '';
    document.getElementById('avatar').textContent = first_name.charAt(0).toUpperCase() || '👤';

    try {
      const res = await fetch(`${API_BASE}/user`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({ telegram_id, first_name, username }),
      });
      currentUser = await res.json();
      document.getElementById('balance').textContent = currentUser.balance.toLocaleString();
    } catch (err) {
      console.error("Backend xatosi:", err);
      document.getElementById('balance').textContent = "xato";
    }
  }

  async function loadProducts() {
    const container = document.getElementById('productsView');
    container.innerHTML = '<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';
    
    try {
      const res = await fetch(`${API_BASE}/products`, { headers: apiHeaders });
      const products = await res.json();

      container.innerHTML = "";
      products.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.style.animationDelay = (idx * 0.05) + 's';
        card.innerHTML = `
          <div class="product-icon">${p.icon}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.variants.length} paket</div>
        `;
        card.onclick = () => showVariants(p);
        container.appendChild(card);
      });
    } catch (err) {
      container.innerHTML = '<div class="loading"><p style="color:#ff6b6b;">Backendga ulanib bo\'lmadi</p></div>';
    }
  }

  function showVariants(product) {
    selectedProduct = product;
    selectedVariant = null;
    
    document.getElementById('productsView').style.display = 'none';
    document.getElementById('variantView').classList.add('active');
    document.getElementById('variantTitle').textContent = `${product.icon} ${product.name}`;

    // Input fields - product'ga qarab
    let inputHTML = '';
    if (product.name.includes('TG STARS') || product.name.includes('TG PREMIUM')) {
      inputHTML = `
        <div class="input-group">
          <label class="input-label">@️ Telegram Username</label>
          <input type="text" id="playerInput" class="input-field" placeholder="@username">
        </div>
      `;
    } else if (product.name.includes('MOBILE LEGENDS')) {
      inputHTML = `
        <div class="input-group">
          <label class="input-label">🆔 O'yinchi ID</label>
          <input type="text" id="playerInput" class="input-field" placeholder="O'yinchi ID">
        </div>
        <div class="input-group">
          <label class="input-label">🖥️ Server</label>
          <select id="serverInput" class="input-field">
            <option>VIP (Global)</option>
            <option>PH (Philippines)</option>
            <option>ID (Indonesia)</option>
            <option>MY (Malaysia)</option>
            <option>TH (Thailand)</option>
            <option>SG (Singapore)</option>
          </select>
        </div>
      `;
    } else {
      inputHTML = `
        <div class="input-group">
          <label class="input-label">👤 O'yinchi ID / Login</label>
          <input type="text" id="playerInput" class="input-field" placeholder="O'yinchi ID kiriting">
        </div>
      `;
    }

    document.getElementById('inputFields').innerHTML = inputHTML;

    // Variants
    const grid = document.getElementById('variantsGrid');
    grid.innerHTML = '';
    product.variants.forEach((v, idx) => {
      const item = document.createElement('div');
      item.className = 'variant-item';
      item.style.animationDelay = (idx * 0.05) + 's';
      item.innerHTML = `
        <div class="variant-label">${v.label}</div>
        <div class="variant-price">${v.price.toLocaleString()} so'm</div>
      `;
      item.onclick = () => selectVariant(item, v);
      grid.appendChild(item);
    });
  }

  function selectVariant(element, variant) {
    document.querySelectorAll('.variant-item').forEach(e => {
      e.classList.remove('selected');
    });
    element.classList.add('selected');
    selectedVariant = variant;
  }

  function backToProducts() {
    document.getElementById('variantView').classList.remove('active');
    document.getElementById('productsView').style.display = 'grid';
  }

  async function completePurchase() {
    if (!selectedVariant) {
      alert('Paketni tanlang');
      return;
    }
    
    const playerInput = document.getElementById('playerInput')?.value.trim();
    if (!playerInput) {
      alert('Ma\'lumot kiriting');
      return;
    }

    if (!currentUser) return;

    const confirmed = confirm(`${selectedProduct.name} - ${selectedVariant.label}\n${selectedVariant.price.toLocaleString()} so'm\n\nTasdiq?`);
    if (!confirmed) return;

    try {
      const res = await fetch(`${API_BASE}/order`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({
          telegram_id: currentUser.telegram_id,
          product_name: `${selectedProduct.name} - ${selectedVariant.label}`,
          price: selectedVariant.price,
        }),
      });
      const result = await res.json();

      if (result.success) {
        alert("✅ " + result.message);
        loadUser();
        backToProducts();
        loadProducts();
      } else {
        alert("❌ " + result.message);
      }
    } catch (err) {
      alert("Xato yuz berdi");
    }
  }

  // Start
  window.addEventListener('load', () => {
    loadUser();
    loadProducts();
  });
</script>

</body>
</html>
