<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BuyPin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #0e1320);
    color: var(--tg-theme-text-color, #ffffff);
    padding: 16px;
    padding-bottom: 90px;
  }
  .profile { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .profile .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: #444; display: flex; align-items: center; justify-content: center;
  }
  .profile .name { font-weight: 600; }
  .profile .username { color: #8a8f9a; font-size: 13px; }

  .balance-card {
    background: linear-gradient(135deg, #5b4dff, #7a6bff);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .balance-card .label { font-size: 13px; opacity: 0.85; }
  .balance-card .amount { font-size: 28px; font-weight: 700; margin: 4px 0 14px; }
  .balance-actions { display: flex; gap: 8px; }
  .balance-actions button {
    flex: 1;
    background: rgba(255,255,255,0.18);
    border: none;
    color: #fff;
    padding: 10px 6px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }

  .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
  .tabs button {
    flex: 1;
    padding: 10px;
    border-radius: 14px;
    border: none;
    background: #1b2230;
    color: #8a8f9a;
    font-weight: 600;
  }
  .tabs button.active { background: #2a2f6b; color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .product {
    background: #1b2230;
    border-radius: 14px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
  }
  .product .icon { font-size: 28px; margin-bottom: 6px; }
  .product .name { font-weight: 600; }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: #131a28;
    padding: 10px 0 16px;
  }
  .bottom-nav .item {
    flex: 1;
    text-align: center;
    color: #8a8f9a;
    font-size: 11px;
  }
  .bottom-nav .item.active { color: #7a6bff; font-weight: 600; }
</style>
</head>
<body>

  <div class="profile">
    <div class="avatar">👤</div>
    <div>
      <div class="name" id="userName">Foydalanuvchi</div>
      <div class="username" id="userUsername">@username</div>
    </div>
  </div>

  <div class="balance-card">
    <div class="label">Balans</div>
    <div class="amount"><span id="balance">0</span> so'm</div>
    <div class="balance-actions">
      <button onclick="alert('Bu yerga hisobni toldirish oqimi ulanadi')">💳 Hisobni to'ldirish</button>
      <button onclick="alert('Bonus kodlar oynasi')">🎁 Bonus kodlar</button>
      <button onclick="alert('Support chat ochiladi')">💬 Qo'llab-quvvatlash</button>
    </div>
  </div>

  <div class="tabs">
    <button class="active">O'yinlar</button>
    <button>Promokodlar</button>
  </div>

  <div class="grid" id="productGrid"></div>

  <div class="bottom-nav">
    <div class="item active">🏠<br>Bosh sahifa</div>
    <div class="item">🕓<br>Tarix</div>
    <div class="item">👤<br>Sozlamalar</div>
    <div class="item">🎮<br>Ijaraga</div>
  </div>

<script>
  // ⚠️ Shu yerga o'zingizning ngrok linkingizni qo'ying (oxiridagi / siz)
  const API_BASE = "https://oxford-moving-curling.ngrok-free.dev";

  const tg = window.Telegram?.WebApp;
  let currentUser = null; // backend'dan kelgan foydalanuvchi ma'lumoti

  if (tg) {
    tg.expand();
    tg.ready();
  }

  // ngrok bepul tarifda har bir so'rovga ogohlantirish sahifasini
  // qo'shadi, shu headerni yuborsak, to'g'ridan-to'g'ri javob qaytaradi.
  const apiHeaders = {
    "Content-Type": "application/json",
    "ngrok-skip-browser-warning": "true",
  };

  async function loadUser() {
    const tgUser = tg?.initDataUnsafe?.user;
    const telegram_id = tgUser?.id || 123456; // brauzerda sinash uchun zaxira ID
    const first_name = tgUser?.first_name || "Mehmon";
    const username = tgUser?.username || "";

    document.getElementById('userName').textContent = first_name;
    document.getElementById('userUsername').textContent = username ? '@' + username : '';

    try {
      const res = await fetch(`${API_BASE}/user`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({ telegram_id, first_name, username }),
      });
      currentUser = await res.json();
      document.getElementById('balance').textContent = currentUser.balance.toLocaleString();
    } catch (err) {
      console.error("Backendga ulanib bo'lmadi:", err);
      document.getElementById('balance').textContent = "xato";
    }
  }

  async function loadProducts() {
    const grid = document.getElementById('productGrid');
    try {
      const res = await fetch(`${API_BASE}/products`, { headers: apiHeaders });
      const products = await res.json();

      grid.innerHTML = "";
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <div class="icon">${p.icon}</div>
          <div class="name">${p.name}</div>
        `;
        div.onclick = () => buyProduct(p);
        grid.appendChild(div);
      });
    } catch (err) {
      console.error("Mahsulotlarni olishda xato:", err);
      grid.innerHTML = "<p style='color:#ff6b6b'>Backendga ulanib bo'lmadi</p>";
    }
  }

  async function buyProduct(product) {
    showVariants(product);
  }

  function showVariants(product) {
    const grid = document.getElementById('productGrid');
    const tabs = document.querySelector('.tabs');

    tabs.style.display = 'none';

    grid.style.gridTemplateColumns = '1fr';
    grid.innerHTML = `
      <div style="text-align:left; margin-bottom:10px;">
        <button id="backBtn" style="background:#1b2230; color:#fff; border:none; padding:8px 14px; border-radius:10px; font-size:13px;">← Orqaga</button>
      </div>
      <div style="font-weight:700; font-size:16px; margin-bottom:10px;">${product.icon} ${product.name}</div>
    `;

    product.variants.forEach(v => {
      const row = document.createElement('div');
      row.className = 'product';
      row.style.display = 'flex';
      row.style.justifyContent = 'space-between';
      row.style.alignItems = 'center';
      row.style.textAlign = 'left';
      row.style.marginBottom = '8px';
      row.innerHTML = `
        <span>${v.label}</span>
        <span style="color:#7a6bff; font-weight:600;">${v.price.toLocaleString()} so'm</span>
      `;
      row.onclick = () => buyVariant(product, v);
      grid.appendChild(row);
    });

    document.getElementById('backBtn').onclick = () => {
      tabs.style.display = 'flex';
      grid.style.gridTemplateColumns = '1fr 1fr 1fr';
      loadProducts();
    };
  }

  async function buyVariant(product, variant) {
    if (!currentUser) return;

    const confirmed = confirm(`${product.name} — ${variant.label}ni ${variant.price.toLocaleString()} so'mga sotib olasizmi?`);
    if (!confirmed) return;

    try {
      const res = await fetch(`${API_BASE}/order`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({
          telegram_id: currentUser.telegram_id,
          product_name: `${product.name} - ${variant.label}`,
          price: variant.price,
        }),
      });
      const result = await res.json();

      if (result.success) {
        alert("✅ " + result.message);
        loadUser();
      } else {
        alert("❌ " + result.message);
      }
    } catch (err) {
      alert("Xato yuz berdi, qaytadan urinib ko'ring");
    }
  }

  // Sahifa ochilganda ishga tushadi
  loadUser();
  loadProducts();
</script>

</body>
</html>
