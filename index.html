<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BuyPin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ========== ANIMATSIYALAR ========== */
  @keyframes slideInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 15px rgba(91, 77, 255, 0.4), inset 0 0 20px rgba(91, 77, 255, 0.1); }
    50% { box-shadow: 0 0 40px rgba(91, 77, 255, 1), inset 0 0 40px rgba(91, 77, 255, 0.4), 0 0 80px rgba(91, 77, 255, 0.6); }
  }
  @keyframes scaleHover {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
  @keyframes buttonClick {
    0% { transform: scale(1); }
    50% { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  @keyframes balanceFlash {
    0%, 100% { color: #fff; text-shadow: 0 0 0px rgba(46, 204, 113, 0); }
    50% { color: #2ecc71; text-shadow: 0 0 15px rgba(46, 204, 113, 0.8); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.15); }
  }
  @keyframes spinner {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(91, 77, 255, 0.3);
    border-top-color: #7a6bff;
    border-radius: 50%;
    animation: spinner 0.8s linear infinite;
  }

  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #0e1320);
    color: var(--tg-theme-text-color, #ffffff);
    padding: 16px;
    padding-bottom: 90px;
  }
  .profile { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    margin-bottom: 16px;
    animation: fadeInUp 0.5s ease-out;
  }
  .profile .avatar {
    width: 44px; 
    height: 44px; 
    border-radius: 50%;
    background: linear-gradient(135deg, #5b4dff, #7a6bff);
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
  }
  .profile .name { font-weight: 600; }
  .profile .username { color: #8a8f9a; font-size: 13px; }

  .balance-card {
    background: linear-gradient(135deg, #5b4dff, #7a6bff);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 18px;
    animation: slideInDown 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), glow 3s ease-in-out infinite;
  }
  .balance-card .label { 
    font-size: 13px; 
    opacity: 0.85;
    animation: fadeInUp 0.6s ease-out 0.1s backwards;
  }
  .balance-card .amount { 
    font-size: 28px; 
    font-weight: 700; 
    margin: 4px 0 14px;
    animation: fadeInUp 0.6s ease-out 0.2s backwards;
  }
  .balance-actions { 
    display: flex; 
    gap: 8px;
    animation: fadeInUp 0.6s ease-out 0.3s backwards;
  }
  .balance-actions button {
    flex: 1;
    background: rgba(255,255,255,0.18);
    border: none;
    color: #fff;
    padding: 10px 6px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .balance-actions button:hover {
    background: rgba(255,255,255,0.28);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .balance-actions button:active {
    animation: buttonClick 0.2s ease;
  }

  .tabs { 
    display: flex; 
    gap: 10px; 
    margin-bottom: 16px;
  }
  .tabs button {
    flex: 1;
    padding: 10px;
    border-radius: 14px;
    border: none;
    background: #1b2230;
    color: #8a8f9a;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    animation: fadeInUp 0.5s ease-out backwards;
  }
  .tabs button:nth-child(1) { animation-delay: 0.4s; }
  .tabs button:nth-child(2) { animation-delay: 0.5s; }
  .tabs button.active { 
    background: #2a2f6b; 
    color: #fff;
    box-shadow: 0 0 20px rgba(91, 77, 255, 0.4);
  }
  .tabs button:hover:not(.active) {
    background: #252a3d;
    transform: translateY(-2px);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .product {
    background: #1b2230;
    border-radius: 14px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: fadeInUp 0.5s ease-out backwards;
    position: relative;
    overflow: hidden;
  }
  .product:nth-child(1) { animation-delay: 0.6s; }
  .product:nth-child(2) { animation-delay: 0.65s; }
  .product:nth-child(3) { animation-delay: 0.7s; }
  .product:nth-child(4) { animation-delay: 0.75s; }
  .product:nth-child(5) { animation-delay: 0.8s; }
  .product:nth-child(6) { animation-delay: 0.85s; }

  .product:hover {
    transform: translateY(-8px) scale(1.06);
    box-shadow: 0 15px 40px rgba(91, 77, 255, 0.5);
    background: linear-gradient(135deg, #252a3d, #2a2f6b);
  }
  .product:active {
    animation: buttonClick 0.2s ease;
  }
  .product .icon { 
    font-size: 28px; 
    margin-bottom: 6px;
    animation: pulse 2s ease-in-out infinite;
    display: inline-block;
  }
  .product .name { 
    font-weight: 600;
    color: #fff;
  }

  .bottom-nav {
    position: fixed;
    bottom: 0; 
    left: 0; 
    right: 0;
    display: flex;
    background: #131a28;
    padding: 10px 0 16px;
    animation: slideInUp 0.5s ease-out;
  }
  .bottom-nav .item {
    flex: 1;
    text-align: center;
    color: #8a8f9a;
    font-size: 11px;
    transition: all 0.3s ease;
  }
  .bottom-nav .item.active { 
    color: #7a6bff; 
    font-weight: 600;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .bottom-nav .item:hover {
    color: #fff;
  }

  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <div class="profile">
    <div class="avatar">👤</div>
    <div>
      <div class="name" id="userName">Foydalanuvchi</div>
      <div class="username" id="userUsername">@username</div>
    </div>
  </div>

  <div class="balance-card">
    <div class="label">Balans</div>
    <div class="amount"><span id="balance">0</span> so'm</div>
    <div class="balance-actions">
      <button onclick="alert('Bu yerga hisobni toldirish oqimi ulanadi')">💳 Hisobni to'ldirish</button>
      <button onclick="alert('Bonus kodlar oynasi')">🎁 Bonus kodlar</button>
      <button onclick="alert('Support chat ochiladi')">💬 Qo'llab-quvvatlash</button>
    </div>
  </div>

  <div class="tabs">
    <button class="active">O'yinlar</button>
    <button>Promokodlar</button>
  </div>

  <div class="grid" id="productGrid"></div>

  <div class="bottom-nav">
    <div class="item active">🏠<br>Bosh sahifa</div>
    <div class="item">🕓<br>Tarix</div>
    <div class="item">👤<br>Sozlamalar</div>
    <div class="item">🎮<br>Ijaraga</div>
  </div>

<script>
  // ⚠️ Shu yerga o'zingizning ngrok linkingizni qo'ying (oxiridagi / siz)
  const API_BASE = "https://oxford-moving-curling.ngrok-free.dev";

  const tg = window.Telegram?.WebApp;
  let currentUser = null; // backend'dan kelgan foydalanuvchi ma'lumoti

  if (tg) {
    tg.expand();
    tg.ready();
  }

  // ngrok bepul tarifda har bir so'rovga ogohlantirish sahifasini
  // qo'shadi, shu headerni yuborsak, to'g'ridan-to'g'ri javob qaytaradi.
  const apiHeaders = {
    "Content-Type": "application/json",
    "ngrok-skip-browser-warning": "true",
  };

  async function loadUser() {
    const tgUser = tg?.initDataUnsafe?.user;
    const telegram_id = tgUser?.id || 123456;
    const first_name = tgUser?.first_name || "Mehmon";
    const username = tgUser?.username || "";

    document.getElementById('userName').textContent = first_name;
    document.getElementById('userUsername').textContent = username ? '@' + username : '';
    document.getElementById('balance').textContent = '...';

    try {
      const res = await fetch(`${API_BASE}/user`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({ telegram_id, first_name, username }),
      });
      currentUser = await res.json();
      const balanceEl = document.getElementById('balance');
      balanceEl.textContent = currentUser.balance.toLocaleString();
      // Balans o'zgarsa flash animatsiya
      balanceEl.style.animation = 'none';
      setTimeout(() => {
        balanceEl.style.animation = 'balanceFlash 0.8s ease';
      }, 10);
    } catch (err) {
      console.error("Backendga ulanib bo'lmadi:", err);
      document.getElementById('balance').textContent = "xato";
    }
  }

  async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div style="text-align:center; padding:20px;"><div class="spinner"></div> Yuklanmoqda...</div>';
    
    try {
      const res = await fetch(`${API_BASE}/products`, { headers: apiHeaders });
      const products = await res.json();

      grid.innerHTML = "";
      products.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <div class="icon">${p.icon}</div>
          <div class="name">${p.name}</div>
        `;
        div.style.animationDelay = (idx * 0.05) + 's';
        div.onclick = () => buyProduct(p);
        grid.appendChild(div);
      });
    } catch (err) {
      console.error("Mahsulotlarni olishda xato:", err);
      grid.innerHTML = "<p style='color:#ff6b6b'>Backendga ulanib bo'lmadi</p>";
    }
  }

  async function buyProduct(product) {
    showVariants(product);
  }

  function showVariants(product) {
    const grid = document.getElementById('productGrid');
    const tabs = document.querySelector('.tabs');

    tabs.style.display = 'none';

    grid.style.gridTemplateColumns = '1fr';
    grid.innerHTML = `
      <div style="text-align:left; margin-bottom:10px;">
        <button id="backBtn" style="background:#1b2230; color:#fff; border:none; padding:8px 14px; border-radius:10px; font-size:13px;">← Orqaga</button>
      </div>
      <div style="font-weight:700; font-size:16px; margin-bottom:10px;">${product.icon} ${product.name}</div>
    `;

    product.variants.forEach(v => {
      const row = document.createElement('div');
      row.className = 'product';
      row.style.display = 'flex';
      row.style.justifyContent = 'space-between';
      row.style.alignItems = 'center';
      row.style.textAlign = 'left';
      row.style.marginBottom = '8px';
      row.innerHTML = `
        <span>${v.label}</span>
        <span style="color:#7a6bff; font-weight:600;">${v.price.toLocaleString()} so'm</span>
      `;
      row.onclick = () => buyVariant(product, v);
      grid.appendChild(row);
    });

    document.getElementById('backBtn').onclick = () => {
      tabs.style.display = 'flex';
      grid.style.gridTemplateColumns = '1fr 1fr 1fr';
      loadProducts();
    };
  }

  async function buyVariant(product, variant) {
    if (!currentUser) return;

    const confirmed = confirm(`${product.name} — ${variant.label}ni ${variant.price.toLocaleString()} so'mga sotib olasizmi?`);
    if (!confirmed) return;

    try {
      const res = await fetch(`${API_BASE}/order`, {
        method: "POST",
        headers: apiHeaders,
        body: JSON.stringify({
          telegram_id: currentUser.telegram_id,
          product_name: `${product.name} - ${variant.label}`,
          price: variant.price,
        }),
      });
      const result = await res.json();

      if (result.success) {
        alert("✅ " + result.message);
        loadUser();
      } else {
        alert("❌ " + result.message);
      }
    } catch (err) {
      alert("Xato yuz berdi, qaytadan urinib ko'ring");
    }
  }

  // Sahifa ochilganda ishga tushadi
  loadUser();
  loadProducts();
</script>

</body>
</html>
